name: Release

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Hassfest validation
        uses: home-assistant/actions/hassfest@master
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: integration

  tag:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tagged: ${{ steps.tag.outputs.tagged }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - uses: actions/checkout@v7

      - name: Extract version and check tag
        id: tag
        run: |
          VERSION=$(python3 -c "import json; print(json.load(open('custom_components/wx_watcher/manifest.json'))['version'])")
          TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tagged=false" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists, skipping"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "tagged=true" >> "$GITHUB_OUTPUT"
            echo "Created and pushed tag ${TAG}"
          fi

  release:
    needs: tag
    if: needs.tag.outputs.tagged == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate release notes
        id: cliff
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag v${{ needs.tag.outputs.version }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.tag.outputs.version }}
          name: ${{ needs.tag.outputs.version }}
          body: ${{ steps.cliff.outputs.content }}
          draft: false
          prerelease: false
