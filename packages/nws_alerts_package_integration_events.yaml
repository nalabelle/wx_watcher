#################################################################################
#
#   NWS ALERTS EVENT-DRIVEN AUTOMATION PACKAGE
#
#   Uses custom events fired by the nws_alerts integration:
#
#     - nws_alerts_alert_created    : fired when a new alert appears
#     - nws_alerts_alert_updated    : fired when an existing alert's data changes
#     - nws_alerts_alert_cleared   : fired when an alert is no longer active
#     - nws_alerts_alert_stale_data : fired when the NWS API fetch fails
#
#   Event data includes all alert fields: Event, ID, URL, Headline, Type, NWSCode,
#   Status, Severity, Certainty, Urgency, Response, SenderName, Sent, Onset, Expires,
#   Ends, Effective, AreasAffected, Description, Instruction, FormattedHeadline,
#   VTEC, VTECAction, References — plus config_entry_id and config_name, which
#   identify which NWS Alerts config entry fired the event. Use these to deduplicate
#   when running multiple config entries (e.g., one for your home zone and one
#   tracking your phone via device_tracker).
#
#   DEDUPLICATION:
#   The NWS Alerts → Ticker automation below includes a condition that skips events
#   from the phone-tracker config entry ("NWS Alerts Phone") when your phone is
#   at home, since the home-zone entry will already fire the same alert. When your
#   phone is away, the phone-tracker entry's events pass through so you still
#   receive alerts. Replace 'device_tracker.sm_g998u' with your phone's entity_id
#   and 'NWS Alerts Phone' with your phone-tracker config entry name if different.
#
#   TICKER CONFIGURATION (Option B — Always mode + device preferences):
#   1. In the Ticker admin panel, create categories: weather_warning, weather_watch,
#      weather_advisory.
#   2. In the Ticker user panel, set your global device preference to "Selected
#      devices only" and pick your phone. This makes the phone the default target.
#   3. Under each weather category, enable "Also send to additional devices" and
#      add your home devices (tablet, speaker, etc.). These are additive — the
#      notification goes to phone + home devices.
#   4. How routing works:
#        - Phone at home: Home entry events → Ticker delivers to phone + home
#          devices. Phone entry events → blocked by the dedup condition.
#        - Phone away: Both entries may fire events for the same alert, but
#          Ticker's tag replacement (tag: nws_{{ ID }}) ensures the phone only
#          shows one notification per alert.
#
#   IMPORTANT: This package requires the fork version of nws_alerts that fires
#   these events. If you are using the upstream version, use the v6+ package instead.
#
#   The entity_id below (sensor.nws_alerts_alerts) assumes the default name "NWS Alerts".
#   If you changed the name during setup, adjust the entity_id accordingly.
#
#################################################################################

######################## BINARY SENSOR  #########################################

binary_sensor:
  - platform: template
    sensors:
      nws_alerts_are_active:
        friendly_name: NWS Alerts Are Active
        value_template: >
          {{ states('sensor.nws_alerts_alerts') | int(0) > 0 }}
        icon_template: >-
          {% if states('sensor.nws_alerts_alerts') | int(0) > 0 %}
            mdi:weather-lightning
          {% else %}
            mdi:weather-sunny
          {% endif %}

########################  AUTOMATIONS  ##########################################

automation:
  ###############################################################################
  #
  #   NWS Alerts → Ticker
  #
  #   Sends Watch/Warning/Advisory notifications via Ticker with deduplication
  #   for multiple config entries. See the file header for Ticker configuration.
  #
  ###############################################################################

  - alias: NWS Alerts → Ticker
    id: nws_alerts_ticker
    description: Watch/Warning/Advisory notifications via Ticker with dedup
    mode: queued
    max: 10
    triggers:
      - trigger: event
        event_type: nws_alerts_alert_created
      - trigger: event
        event_type: nws_alerts_alert_updated
      - trigger: event
        event_type: nws_alerts_alert_cleared
    conditions:
      - condition: template
        value_template: >-
          {{ trigger.event.data.config_name != 'NWS Alerts Phone'
             or not is_state('device_tracker.sm_g998u', 'home') }}
    actions:
      - if:
          - condition: template
            value_template: >-
              {{ trigger is defined and trigger.event is defined and
                trigger.event.event_type == 'nws_alerts_alert_cleared' }}
        then:
          - action: ticker.notify
            data:
              message: clear_notification
              data:
                tag: nws_{{ trigger.event.data.ID }}
        else:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger is defined and trigger.event is defined and
                        'Warning' in trigger.event.data.Event }}
                sequence:
                  - action: ticker.notify
                    data:
                      category: weather_warning
                      title: >-
                        ⚠️ {{ 'Updated' if trigger.event.event_type ==
                          'nws_alerts_alert_updated' else 'New' }}: {{
                          trigger.event.data.Event }}
                      message: >-
                        {{ trigger.event.data.Headline }} {% if
                          trigger.event.data.Instruction %} {{
                          trigger.event.data.Instruction }} {% endif %}
                      data:
                        tag: nws_{{ trigger.event.data.ID }}
                        url: "{{ trigger.event.data.URL }}"
              - conditions:
                  - condition: template
                    value_template: >-
                      {{ trigger is defined and trigger.event is defined and 'Watch'
                        in trigger.event.data.Event }}
                sequence:
                  - action: ticker.notify
                    data:
                      category: weather_watch
                      title: >-
                        🟡 {{ 'Updated' if trigger.event.event_type ==
                          'nws_alerts_alert_updated' else 'New' }}: {{
                          trigger.event.data.Event }}
                      message: >-
                        {{ trigger.event.data.Headline }} {% if
                          trigger.event.data.Instruction %} {{
                          trigger.event.data.Instruction }} {% endif %}
                      data:
                        tag: nws_{{ trigger.event.data.ID }}
                        url: "{{ trigger.event.data.URL }}"
            default:
              - condition: template
                value_template: "{{ trigger is defined and trigger.event is defined }}"
              - action: ticker.notify
                data:
                  category: weather_advisory
                  title: 🔵 {{ trigger.event.data.Event }}
                  message: >-
                    {{ trigger.event.data.Headline }} {% if
                      trigger.event.data.Instruction %} {{
                      trigger.event.data.Instruction }} {% endif %}
                  data:
                    tag: nws_{{ trigger.event.data.ID }}
                    url: "{{ trigger.event.data.URL }}"

  ###############################################################################
  #
  #   Uncomment this automation if you want to be notified when the NWS API
  #   is unreachable and alert data may be stale. The event_data includes
  #   last_successful — the ISO timestamp of the last successful update,
  #   or null if the integration has never successfully fetched data.
  #
  ###############################################################################

  # - alias: NWS - Stale Data Warning
  #   id: nws_alert_stale_data_warning
  #   description: Warn when NWS alert data may be stale due to API failure
  #   trigger:
  #     - trigger: event
  #       event_type: nws_alerts_alert_stale_data
  #   action:
  #     - action: persistent_notification.create
  #       data:
  #         notification_id: nws_stale_data_warning
  #         title: "NWS Alerts: Data May Be Stale"
  #         message: >
  #           The NWS Alerts integration was unable to fetch updated data.
  #           Last successful update: {{ trigger.event.data.last_successful or 'Never' }}
